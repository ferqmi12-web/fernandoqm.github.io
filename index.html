<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
}

.container {
  margin-top: 50px;
}

h1 {
  font-size: 40px;
}

p {
  font-size: 20px;
  max-width: 600px;
  margin: auto;
}

img {
  width: 250px;
  border-radius: 20px;
  margin-top: 20px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-size: 18px;
  cursor: pointer;
}

#mensaje {
  display: none;
  font-size: 22px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Para ti ❤️</h1>

  <img src="foto.jpg" alt="Nosotros">

  <p>
    Desde que llegaste a mi vida, todo cambió para mejor 💖
  </p>

  <button onclick="mostrarMensaje()">Haz clic 💌</button>

  <p id="mensaje">
    Te quiero muchísimo ❤️✨
  </p>
</div>

<script>
function mostrarMensaje() {
  document.getElementById("mensaje").style.display = "block";
}
</script>

</body>
</html>
